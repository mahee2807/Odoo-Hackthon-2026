<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EcoSphere: App</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="login-overlay" class="login-overlay">
    <div class="login-card">
      <h2>Sign in to EcoSphere</h2>
      <form id="app-login-form">
        <label for="login-email">Email Address</label>
        <input id="login-email" type="email" placeholder="name@company.com" required>

        <div class="pass-row">
          <label for="login-password">Password</label>
          <a href="#">Forgot?</a>
        </div>
        <input id="login-password" type="password" placeholder="********" required>

        <div class="remember-row">
          <input id="login-remember" type="checkbox">
          <label for="login-remember">Remember me for 30 days</label>
        </div>

        <div style="display:flex;gap:10px;align-items:center;margin-top:10px">
          <button type="button" id="demo-signin" class="btn btn--dark">Demo Sign-In</button>
          <button type="submit" class="btn btn--green">Sign In</button>
        </div>
      </form>
    </div>
  </div>
  <header class="app-topbar">
    <div class="left">
      <img src="/login/images/logo.png?v=3" class="logo" alt="EcoSphere">
      <h1>EcoSphere</h1>
    </div>
    <nav class="app-tabs">
      <button class="tab active" data-target="dashboard">Dashboard</button>
      <button class="tab" data-target="environment">Environmental</button>
      <button class="tab" data-target="social">Social</button>
      <button class="tab" data-target="governance">Governance</button>
      <button class="tab" data-target="gamification">Gamification</button>
      <button class="tab" data-target="reports">Reports</button>
      <button class="tab" data-target="settings">Settings</button>
    </nav>
  </header>

  <main class="app-main">
    <div id="dashboard" class="app-pane">
      <iframe src="dashboard/index.html" frameborder="0"></iframe>
    </div>

    <div id="environment" class="app-pane hidden">
      <iframe src="environment/index.html" frameborder="0"></iframe>
    </div>
    <div id="social" class="app-pane hidden">
      <iframe src="social/index.html" frameborder="0"></iframe>
    </div>
    <div id="governance" class="app-pane hidden">
      <iframe src="governance/index.html" frameborder="0"></iframe>
    </div>
    <div id="gamification" class="app-pane hidden">
      <iframe src="gamification/index.html" frameborder="0"></iframe>
    </div>
    <div id="reports" class="app-pane hidden">
      <iframe src="reports/index.html" frameborder="0"></iframe>
    </div>
    <div id="settings" class="app-pane hidden">
      <iframe src="settings/index.html" frameborder="0"></iframe>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
